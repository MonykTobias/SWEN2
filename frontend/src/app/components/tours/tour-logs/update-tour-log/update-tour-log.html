<div class="update-tour-log" [formGroup]="tourLogForm">
  <div class="control-section">
    <button class="btn btn-back"
            (click)="back()">
      <!-- Back icon -->
      <strong>Back</strong>
    </button>
  </div>
  <div class="field">
    <label>Difficulty</label>
    <select formControlName="difficulty"
    [class.error]="errors().includes( 'difficulty')"
    [class.correct]="corrects().includes( 'difficulty')">
      @for(difficulty of difficultyOptions; track difficulty.value){
        <option [value]="difficulty.value">{{difficulty.label}}</option>
      }
    </select>
  </div>
  <div class="field">
    <label>Rating</label>
    <select formControlName="rating"
    [class.error]="errors().includes( 'rating')"
    [class.correct]="corrects().includes( 'rating')">
      @for(rating of ratingOptions; track rating.value){
        <option [value]="rating.value">{{rating.label}}</option>
      }
    </select>
  </div>
</div>
